version: v2
plugins:
  # Go
  - local: protoc-gen-go
    out: gen/go/
    opt:
      - paths=source_relative

  # Go gRPC (needed for cofidectl plugin service stubs)
  - remote: buf.build/grpc/go:v1.5.1
    out: gen/go/
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false
